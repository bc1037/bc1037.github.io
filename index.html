<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Britney Cruz Martinez | Aspiring CPA</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #002147;
            --gold: #D4AF37;
            --white: #ffffff;
            --off-white: #FDFDFD;
            --text-dark: #333333;
            --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        }

        html { scroll-behavior: smooth; }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--off-white);
            color: var(--text-dark);
            font-family: 'Montserrat', sans-serif;
            line-height: 1.6;
        }

        /* --- Navigation --- */
        nav {
            position: sticky; top: 0; background: var(--navy);
            padding: 1rem 10%; display: flex; justify-content: space-between;
            align-items: center; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.2);
        }
        .logo { color: var(--white); font-family: 'Playfair Display', serif; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        .logo span { color: var(--gold); }
        nav ul { display: flex; list-style: none; gap: 20px; align-items: center; }
        nav a { color: var(--white); text-decoration: none; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; transition: var(--transition); }
        nav a:hover { color: var(--gold); }
        .nav-resume { border: 1px solid var(--gold); padding: 7px 15px; color: var(--gold) !important; font-weight: 600; }

        /* --- Hero Section --- */
        .hero { padding: 80px 10%; display: flex; align-items: center; gap: 50px; min-height: 80vh; background: white; flex-wrap: wrap; }
        
        .profile-frame {
            width: 240px;
            height: 340px;
            overflow: hidden;
            border: 4px solid var(--navy);
            box-shadow: 10px 10px 0px var(--gold);
        }
        
        .profile-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: top;
        }

        .hero-content { flex: 1; min-width: 300px; }
        .hero-content h1 { font-family: 'Playfair Display', serif; font-size: 3.5rem; color: var(--navy); line-height: 1.1; }
        .hero-content h2 { color: var(--gold); font-weight: 400; text-transform: uppercase; letter-spacing: 2px; margin: 10px 0 20px 0; font-size: 1rem; }
        
        /* --- Forensic App Feature Box --- */
        .app-highlight-box {
            background: var(--off-white);
            border: 2px solid var(--navy);
            padding: 25px;
            margin-top: 30px;
            position: relative;
            border-left: 8px solid var(--gold);
        }
        .app-highlight-box h3 {
            font-family: 'Playfair Display', serif;
            color: var(--navy);
            margin-bottom: 10px;
            font-size: 1.4rem;
        }
        .app-highlight-box p {
            font-size: 0.9rem;
            margin-bottom: 15px;
            color: #555;
        }
        
        .btn-group { display: flex; gap: 15px; flex-wrap: wrap; }
        
        .hero-btn { 
            display: inline-block; 
            padding: 12px 25px; 
            background: var(--navy); 
            color: white; 
            text-decoration: none; 
            font-weight: 600; 
            font-size: 0.8rem; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            transition: var(--transition); 
        }
        .hero-btn:hover { background: var(--gold); color: var(--navy); }
        
        .hero-btn.outline {
            background: transparent;
            border: 2px solid var(--navy);
            color: var(--navy);
        }
        .hero-btn.outline:hover {
            background: var(--navy);
            color: white;
        }

        /* --- Experience Section --- */
        .experience { padding: 80px 10%; }
        .section-header { font-family: 'Playfair Display', serif; color: var(--navy); margin-bottom: 40px; text-align: center; font-size: 2.2rem; }
        .job-card { background: white; padding: 30px; margin-bottom: 20px; border-left: 5px solid var(--navy); box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .job-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .job-title { font-weight: 600; color: var(--navy); font-size: 1.1rem; }
        .company { color: var(--gold); font-weight: 600; }
        .date { font-size: 0.85rem; color: #777; }
        .job-card ul { padding-left: 20px; font-size: 0.9rem; color: #555; }

        /* --- Leadership Grid --- */
        .leadership { padding: 80px 10%; background: #f9f9f9; }
        .lead-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .lead-card { background: white; padding: 25px; border: 1px solid #eee; border-top: 3px solid var(--gold); }
        .lead-card h4 { color: var(--navy); margin-bottom: 10px; font-family: 'Playfair Display', serif; }
        .lead-card p { font-size: 0.85rem; color: #666; }
        .tag-rutgers { color: #cc0033; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; display: block; margin-bottom: 5px; }

        /* --- Skills Bar --- */
        .skills-bar { background: var(--navy); padding: 50px 10%; text-align: center; color: white; }
        .pill { display: inline-block; padding: 8px 20px; background: rgba(255,255,255,0.1); color: white; border: 1px solid var(--gold); border-radius: 50px; margin: 5px; font-size: 0.8rem; }
